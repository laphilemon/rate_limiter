services:
  # the nodejs api
  api:
    build:
      context: .
      target: production  
    container_name: rate_limit_api
    restart: always
    ports:
      - "9090:9090"
    env_file: .env
    environment: 
      - NODE_ENV=production
      - DB_HOST=db
      - REDIS_HOST=cache
      - RABBITMQ_HOST=rabbitmq
    depends_on:
        db:
          condition: service_healthy
        cache:
          condition: service_healthy
        rabbitmq:
          condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: 0.5
          memory: 512M
    networks:
      - backend
  db:
    image: postgres:15-alpine
    container_name: rate_limit_db
    restart: always
    shm_size: 128mb
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - ./src/database/schema.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U $${DB_USER}", "-d", "${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  cache:
    image: redis:7-alpine
    container_name: rate_limit_redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: 0.5
          memory: 512M
    networks:
      - backend

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rate_limit_rabbitmq
    restart: always
    ports:
      - '5672:5672'
      - '15672:15672'
    environment:
    - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-guest}
    - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - backend
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  backend:
    driver: bridge

volumes:
  pgdata:
  rabbitmq_data: